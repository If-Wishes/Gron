<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ELITE Notes | Note Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.2);
        }
        
        .btn-purple {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            transition: all 0.2s;
        }
        .btn-purple:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(124, 58, 237, 0.3);
        }
        
        .btn-red {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            transition: all 0.2s;
        }
        .btn-red:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3);
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .tab-active {
            background: rgba(124, 58, 237, 0.2);
            color: #7c3aed;
            border-bottom: 3px solid #7c3aed;
        }
        
        .note-item {
            transition: all 0.2s ease;
            border-left: 3px solid #7c3aed;
        }
        .note-item:hover {
            transform: translateX(5px);
            background-color: #f5f3ff;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #e9d5ff;
            border-radius: 50%;
            border-top-color: #7c3aed;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 10px; }
        
        textarea {
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        
        .copy-btn {
            cursor: pointer;
            transition: all 0.2s;
        }
        .copy-btn:hover {
            transform: scale(1.1);
        }
        
        .search-box {
            transition: all 0.2s;
        }
        .search-box:focus {
            border-color: #7c3aed;
            ring: 2px solid #7c3aed;
        }
        
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="min-h-screen p-4">
    <div class="max-w-5xl mx-auto">
        
        <!-- Header -->
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-gradient-to-br from-purple-600 to-purple-800 rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-lg">
                <i class="fas fa-sticky-note text-white text-2xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-white">DECENTRALIX<span class="text-purple-200"> number</span></h1>
            <p class="text-purple-100 text-sm mt-1">Manage your notes with ease</p>
        </div>
        
        <!-- Tab Navigation -->
        <div class="flex gap-2 mb-6">
            <button id="addTabBtn" class="flex-1 glass-card text-center py-3 font-semibold text-gray-600 transition tab-active">
                <i class="fas fa-plus-circle mr-2"></i> Add Note
            </button>
            <button id="viewTabBtn" class="flex-1 glass-card text-center py-3 font-semibold text-gray-600 transition">
                <i class="fas fa-list mr-2"></i> View Notes
            </button>
        </div>
        
        <!-- Add Note Tab -->
        <div id="addTab" class="tab-content">
            <div class="glass-card p-6">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                    <i class="fas fa-pen text-purple-500"></i>
                    Create New Note
                </h2>
                
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">📝 Title                     *</label>
                    <input type="text" id="noteTitle" placeholder="Enter note title..." 
                           class="w-full border border-purple-200 rounded-xl px-4 py-2.5 bg-gray-50 focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">📄 Content</label>
                    <textarea id="noteContent" rows="8" placeholder="Write your note here..." 
                              class="w-full border border-purple-200 rounded-xl px-4 py-2.5 bg-gray-50 focus:ring-2 focus:ring-purple-500 outline-none"></textarea>
                </div>
                
                <div class="mb-4">
<label class="block text-sm font-semibold text-gray-700 mb-2">🏷️ Category (optional)</label>
                    <input type="text" id="noteCategory" placeholder="e.g., Work, Personal, Ideas..." 
                           class="w-full border border-purple-200 rounded-xl px-4 py-2.5 bg-gray-50 focus:ring-2 focus:ring-purple-500 outline-none">                    
                </div>
                
                <button id="saveNoteBtn" class="btn-purple w-full text-white py-3 rounded-xl font-semibold shadow-md">
                    <i class="fas fa-save mr-2"></i>Save Note
                </button>
            </div>
        </div>
        
        <!-- View Notes Tab -->
        <div id="viewTab" class="tab-content" style="display: none;">
            <div class="glass-card p-6">
                <div class="flex justify-between items-center mb-4 flex-wrap gap-3">
                    <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                        <i class="fas fa-list text-purple-500"></i>
                        My Notes
                        <span id="totalCount" class="text-sm bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full">0</span>
                    </h2>
                    <div class="flex gap-2">
                        <input type="text" id="searchNotes" placeholder="🔍 Search notes..." 
                               class="search-box px-3 py-2 border border-purple-200 rounded-xl bg-gray-50 focus:outline-none text-sm w-40 md:w-60">
                        <button id="clearAllBtn" class="btn-red text-white px-4 py-2 rounded-xl text-sm font-semibold shadow-md">
                            <i class="fas fa-trash-alt mr-1"></i> Clear All
                        </button>
                    </div>
                </div>
                
                <!-- Filter by category -->
                <div class="mb-4">
                    <select id="categoryFilter" class="w-full border border-purple-200 rounded-xl px-4 py-2 bg-gray-50 focus:ring-2 focus:ring-purple-500 outline-none">
                        <option value="all">All Categories</option>
                    </select>
                </div>
                
                <!-- Notes List -->
                <div id="notesList" class="space-y-3 max-h-[500px] overflow-y-auto">
                    <div class="text-center py-8 text-gray-400">
                        <div class="loading-spinner"></div>
                        <p class="mt-2">Loading notes...</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="text-center text-purple-200 text-xs mt-6">
            <i class="fas fa-lock mr-1"></i> Secure Storage | Notes are stored in the cloud
        </div>
    </div>
</div>

<script>
// Supabase Configuration
const SUPABASE_URL = 'https://uizrpckqnproauqllono.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpenJwY2txbnByb2F1cWxsb25vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNDc0NjQsImV4cCI6MjA5MDYyMzQ2NH0.qKVaCbH2NiksMuh85guJiRySQxykwSx-MkbWNuE-PdE';

let allNotes = [];
let currentTab = 'add';

// Show toast notification
function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.className = `toast ${type === 'success' ? 'bg-green-500' : 'bg-red-500'} text-white px-4 py-2 rounded-lg shadow-lg text-sm`;
    toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} mr-2"></i>${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// Tab switching
document.getElementById('addTabBtn').addEventListener('click', () => {
    currentTab = 'add';
    document.getElementById('addTab').style.display = 'block';
    document.getElementById('viewTab').style.display = 'none';
    document.getElementById('addTabBtn').classList.add('tab-active');
    document.getElementById('viewTabBtn').classList.remove('tab-active');
});

document.getElementById('viewTabBtn').addEventListener('click', () => {
    currentTab = 'view';
    document.getElementById('addTab').style.display = 'none';
    document.getElementById('viewTab').style.display = 'block';
    document.getElementById('viewTabBtn').classList.add('tab-active');
    document.getElementById('addTabBtn').classList.remove('tab-active');
    loadNotes();
});

// Save note to Supabase
async function saveNote() {
    const title = document.getElementById('noteTitle').value.trim();
    const content = document.getElementById('noteContent').value.trim();
    const category = document.getElementById('noteCategory').value.trim() || 'Uncategorized';
    
    if (!title) {
        showToast('Please enter a title', 'error');
        return;
    }
    
    const noteData = {
        title: title,
        content: content || '',
        category: category,
        created_at: new Date().toISOString(),
        updated_at: new Date().toISOString()
    };
    
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/notes`, {
            method: 'POST',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
            },
            body: JSON.stringify(noteData)
        });
        
        if (response.ok) {
            showToast('✅ Note saved successfully!');
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteContent').value = '';
            document.getElementById('noteCategory').value = '';
            if (currentTab === 'view') {
                loadNotes();
            }
        } else {
            showToast('❌ Failed to save note', 'error');
        }
    } catch (err) {
        console.error('Error saving note:', err);
        showToast('Error saving note', 'error');
    }
}

// Load notes from Supabase
async function loadNotes() {
    const notesList = document.getElementById('notesList');
    notesList.innerHTML = '<div class="text-center py-8 text-gray-400"><div class="loading-spinner"></div><p class="mt-2">Loading notes...</p></div>';
    
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/notes?order=created_at.desc&limit=500`, {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
            }
        });
        
        if (response.ok) {
            allNotes = await response.json();
            updateCategoryFilter();
            displayNotes();
        } else if (response.status === 404) {
            notesList.innerHTML = `
                <div class="text-center py-8 text-gray-400">
                    <i class="fas fa-database text-4xl mb-3 opacity-40"></i>
                    <p>No notes table found. Please create a "notes" table in Supabase with:</p>
                    <pre class="text-left mt-3 text-xs bg-gray-100 p-3 rounded overflow-x-auto">
CREATE TABLE notes (
    id SERIAL PRIMARY KEY,
    title TEXT NOT NULL,
    content TEXT,
    category TEXT DEFAULT 'Uncategorized',
    created_at TIMESTAMP DEFAULT NOW(),
    updated_at TIMESTAMP DEFAULT NOW()
);</pre>
                </div>
            `;
        }
    } catch (err) {
        console.error('Error loading notes:', err);
        notesList.innerHTML = '<div class="text-center py-8 text-red-400"><i class="fas fa-exclamation-triangle text-4xl mb-3"></i><p>Error loading notes</p></div>';
    }
}

// Update category filter dropdown
function updateCategoryFilter() {
    const categories = [...new Set(allNotes.map(n => n.category).filter(c => c))];
    const filterSelect = document.getElementById('categoryFilter');
    filterSelect.innerHTML = '<option value="all">All Categories</option>';
    categories.forEach(cat => {
        filterSelect.innerHTML += `<option value="${escapeHtml(cat)}">${escapeHtml(cat)}</option>`;
    });
}

// Display notes with search and filter
function displayNotes() {
    const searchTerm = document.getElementById('searchNotes').value.toLowerCase();
    const categoryFilter = document.getElementById('categoryFilter').value;
    
    let filteredNotes = allNotes;
    
    // Apply search filter
    if (searchTerm) {
        filteredNotes = filteredNotes.filter(n => 
            n.title.toLowerCase().includes(searchTerm) || 
            (n.content && n.content.toLowerCase().includes(searchTerm))
        );
    }
    
    // Apply category filter
    if (categoryFilter !== 'all') {
        filteredNotes = filteredNotes.filter(n => n.category === categoryFilter);
    }
    
    const notesList = document.getElementById('notesList');
    document.getElementById('totalCount').textContent = filteredNotes.length;
    
    if (filteredNotes.length === 0) {
        notesList.innerHTML = `
            <div class="text-center py-8 text-gray-400">
                <i class="fas fa-inbox text-4xl mb-3 opacity-40"></i>
                <p>No notes found</p>
                <p class="text-xs mt-1">Create a note in the "Add Note" tab</p>
            </div>
        `;
        return;
    }
    
    let html = '';
    for (const note of filteredNotes) {
        const createdDate = new Date(note.created_at).toLocaleDateString();
        const createdTime = new Date(note.created_at).toLocaleTimeString();
        const shortContent = note.content ? (note.content.length > 100 ? note.content.substring(0, 100) + '...' : note.content) : '';
        
        html += `
            <div class="note-item bg-white rounded-xl p-4 shadow-sm border border-purple-100">
                <div class="flex justify-between items-start mb-2 flex-wrap gap-2">
                    <h3 class="font-bold text-gray-800 text-lg">${escapeHtml(note.title)}</h3>
                    <div class="flex gap-2">
                        <button onclick="editNote(${note.id})" class="text-blue-500 hover:text-blue-700 p-1 rounded-lg hover:bg-blue-50 transition" title="Edit">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="deleteNote(${note.id})" class="text-red-500 hover:text-red-700 p-1 rounded-lg hover:bg-red-50 transition" title="Delete">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
                ${note.category && note.category !== 'Uncategorized' ? `<div class="mb-2"><span class="text-xs bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full">${escapeHtml(note.category)}</span></div>` : ''}
                ${shortContent ? `<pre class="text-sm text-gray-600 whitespace-pre-wrap">${escapeHtml(shortContent)}</pre>` : '<p class="text-sm text-gray-400 italic">No content</p>'}
                <div class="mt-3 text-xs text-gray-400">
                    <i class="far fa-calendar-alt mr-1"></i> ${createdDate} at ${createdTime}
                </div>
            </div>
        `;
    }
    
    notesList.innerHTML = html;
}

// Edit note
function editNote(noteId) {
    const note = allNotes.find(n => n.id === noteId);
    if (note) {
        // Switch to add tab
        document.getElementById('addTabBtn').click();
        
        // Fill form with note data
        document.getElementById('noteTitle').value = note.title;
        document.getElementById('noteContent').value = note.content || '';
        document.getElementById('noteCategory').value = note.category || '';
        
        // Change save button to update mode
        const saveBtn = document.getElementById('saveNoteBtn');
        saveBtn.innerHTML = '<i class="fas fa-edit mr-2"></i>Update Note';
        saveBtn.onclick = () => updateNote(noteId);
        
        showToast('Edit mode: Update your note');
    }
}

// Update existing note
async function updateNote(noteId) {
    const title = document.getElementById('noteTitle').value.trim();
    const content = document.getElementById('noteContent').value.trim();
    const category = document.getElementById('noteCategory').value.trim() || 'Uncategorized';
    
    if (!title) {
        showToast('Please enter a title', 'error');
        return;
    }
    
    const updateData = {
        title: title,
        content: content || '',
        category: category,
        updated_at: new Date().toISOString()
    };
    
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/notes?id=eq.${noteId}`, {
            method: 'PATCH',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(updateData)
        });
        
        if (response.ok) {
            showToast('✅ Note updated successfully!');
            // Reset form
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteContent').value = '';
            document.getElementById('noteCategory').value = '';
            
            // Reset save button
            const saveBtn = document.getElementById('saveNoteBtn');
            saveBtn.innerHTML = '<i class="fas fa-save mr-2"></i>Save Note';
            saveBtn.onclick = saveNote;
            
            if (currentTab === 'view') {
                loadNotes();
            }
        } else {
            showToast('❌ Failed to update note', 'error');
        }
    } catch (err) {
        console.error('Error updating note:', err);
        showToast('Error updating note', 'error');
    }
}

// Delete single note
async function deleteNote(id) {
    if (!confirm('Are you sure you want to delete this note?')) return;
    
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/notes?id=eq.${id}`, {
            method: 'DELETE',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
            }
        });
        
        if (response.ok) {
            showToast('Note deleted successfully');
            loadNotes();
        } else {
            showToast('Failed to delete note', 'error');
        }
    } catch (err) {
        console.error('Error deleting note:', err);
        showToast('Error deleting note', 'error');
    }
}

// Clear all notes
async function clearAllNotes() {
    if (!confirm('⚠️ WARNING: This will delete ALL notes! This action cannot be undone. Are you sure?')) return;
    
    const userInput = prompt('Type "DELETE" to confirm deletion of all notes:');
    if (userInput !== 'DELETE') {
        showToast('Cancelled', 'error');
        return;
    }
    
    try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/notes`, {
            method: 'DELETE',
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
            }
        });
        
        if (response.ok) {
            showToast('✅ All notes cleared successfully');
            loadNotes();
        } else {
            showToast('Failed to clear notes', 'error');
        }
    } catch (err) {
        console.error('Error clearing notes:', err);
        showToast('Error clearing notes', 'error');
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m] || m));
}

// Event listeners
document.getElementById('saveNoteBtn').addEventListener('click', saveNote);
document.getElementById('clearAllBtn').addEventListener('click', clearAllNotes);
document.getElementById('searchNotes').addEventListener('input', () => displayNotes());
document.getElementById('categoryFilter').addEventListener('change', () => displayNotes());

// SQL to create notes table (already exists per your table)
console.log('Using existing notes table with structure: id, title, content, category, created_at, updated_at');
</script>
</body>
</html>
