<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMA Panel | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

<div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-8">
    <div class="text-center mb-8">
        <h1 class="text-2xl font-bold">MIMA Panel</h1>
        <p class="text-gray-500">Admin Login</p>
    </div>

    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" class="w-full border rounded-xl px-4 py-3 mb-4">
        <input type="password" id="password" placeholder="Password" class="w-full border rounded-xl px-4 py-3 mb-6">
        <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl">Login</button>
    </form>

    <div id="message" class="mt-4 text-center text-sm hidden"></div>
</div>

<script>
const SUPABASE_URL = 'https://zubkwzsnpdjtndlvqfqf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1Ymt3enNucGRqdG5kbHZxZnFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDgyMjMsImV4cCI6MjA5MDcyNDIyM30.6fcSUpeuBONYGsWCG9lmOaf0lOPq9CDt2Ud9jXsvbSo';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const messageDiv = document.getElementById('message');
    
    const { data, error } = await supabase
        .from('users')
        .select('id, username, role')
        .eq('username', username)
        .eq('password', password)
        .single();
    
    if (data) {
        messageDiv.innerHTML = '✅ Login successful! Redirecting...';
        messageDiv.className = 'mt-4 text-center text-sm text-green-600';
        messageDiv.classList.remove('hidden');
        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 1000);
    } else {
        messageDiv.innerHTML = '❌ Invalid username or password';
        messageDiv.className = 'mt-4 text-center text-sm text-red-600';
        messageDiv.classList.remove('hidden');
    }
});
</script>
</body>
</html>
