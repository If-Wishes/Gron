<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

<h2>User Dashboard</h2>

<button onclick="logout()">Logout</button>

<h3>My OTPs</h3>

<table border="1">
  <thead>
    <tr>
      <th>Number</th>
      <th>Service</th>
      <th>OTP</th>
      <th>Time</th>
    </tr>
  </thead>
  <tbody id="otpTable"></tbody>
</table>

<script type="module">
import { getOtpsForUser } from "../js/supabase.js";

const user = JSON.parse(sessionStorage.getItem("user"));

if (!user) {
  window.location.href = "../index.html";
}

async function loadOtps() {
  const { data, error } = await getOtpsForUser(user.id);

  const table = document.getElementById("otpTable");

  if (!data || data.length === 0) {
    table.innerHTML = "<tr><td colspan='4'>No OTPs yet</td></tr>";
    return;
  }

  table.innerHTML = data.map(o => `
    <tr>
      <td>***${o.phone_last3}</td>
      <td>${o.service || "-"}</td>
      <td>${o.otp}</td>
      <td>${new Date(o.created_at).toLocaleString()}</td>
    </tr>
  `).join("");
}

loadOtps();

window.logout = function () {
  sessionStorage.clear();
  window.location.href = "../index.html";
}
</script>

</body>
</html>
